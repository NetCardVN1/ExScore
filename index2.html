  // --- 1. LẤY LỊCH WORLD CUP 2026 TỪ BẢNG CỦA LINK CHINHPHU.VN ---
  async function fetchWorldCupMatches() {
      const proxyUrl = 'https://api.allorigins.win/get?url=';
      const targetUrl = 'https://xaydungchinhsach.chinhphu.vn/lich-tuong-thuat-truc-tiep-world-cup-2026-119260606115249926.htm';
      try {
          const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
          const data = await response.json();
          const html = data.contents;
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          
          let scheduleTable = null;
          const tables = doc.querySelectorAll('table');
          for (const table of tables) {
              if (table.innerText.includes('Trận đấu') && table.innerText.includes('Bảng')) {
                  scheduleTable = table;
                  break;
              }
          }
          if (!scheduleTable) return [];

          const rows = scheduleTable.querySelectorAll('tr');
          const matches = [];
          for (let i = 1; i < rows.length; i++) {
              const cols = rows[i].querySelectorAll('td');
              if (cols.length >= 4) {
                  let dateStr = cols[0]?.innerText.trim() || '';
                  const timeStr = cols[1]?.innerText.trim() || '';
                  const matchInfo = cols[2]?.innerText.trim() || '';
                  dateStr = dateStr.split('*')[0].split('\n')[0].trim();
                  const teams = matchInfo.split(' vs ');
                  if (teams.length === 2) {
                      const homeTeam = teams[0].trim();
                      const awayTeam = teams[1].trim();
                      let matchDate = null;
                      try {
                          const [day, month] = dateStr.split('/');
                          const currentYear = 2026;
                          const [hour, minute] = timeStr.split(':');
                          matchDate = new Date(currentYear, parseInt(month)-1, parseInt(day), parseInt(hour), parseInt(minute));
                      } catch(e) { console.warn("Lỗi parse ngày:", dateStr, timeStr); }
                      
                      matches.push({
                          id: `wc_${i}_${Date.now()}`,
                          tournamentId: "wc",
                          tournamentName: "World Cup 2026",
                          leagueLogo: tournaments.find(t=>t.id==="wc").logo,
                          scheduleLink: tournaments.find(t=>t.id==="wc").scheduleLink,
                          homeTeam: { name: homeTeam, logo: `https://flagcdn.com/w80/${getCountryCode(homeTeam)}.png` },
                          awayTeam: { name: awayTeam, logo: `https://flagcdn.com/w80/${getCountryCode(awayTeam)}.png` },
                          datetime: matchDate || new Date(),
                          live: false,
                          half: null,
                          minute: null,
                          score: "vs"
                      });
                  }
              }
          }
          return matches;
      } catch (error) {
          console.error("Lỗi khi fetch World Cup:", error);
          return [];
      }
  }

      ];
      const now = new Date();
      const matches = [];
      const excludeIds = ["wc"]; // World cup đã có real data
      tournaments.forEach(t => {
          if (excludeIds.includes(t.id)) return;
          for (let i = 0; i < 2; i++) {
              const isLive = (i === 0 && t.id !== "afc2027");
              const matchTime = isLive ? new Date() : new Date(now.getTime() + (i+1) * 86400000);
              const homeIdx = (t.id.length + i) % teamsPool.length;
              const awayIdx = (homeIdx + 2) % teamsPool.length;
              let halfText = "", minuteText = "";
              if (isLive) { const min = Math.floor(Math.random() * 88) + 2; minuteText = `${min}'`; halfText = min < 45 ? "Hiệp 1" : "Hiệp 2"; }
              matches.push({
                  id: `${t.id}_mock_${i}`,
                  tournamentId: t.id,
                  tournamentName: t.name,
                  leagueLogo: t.logo,
                  scheduleLink: t.scheduleLink,
                  homeTeam: teamsPool[homeIdx],
                  awayTeam: teamsPool[awayIdx],
                  datetime: matchTime,
                  live: isLive,
                  half: halfText,
                  minute: minuteText,
                  score: isLive ? `${Math.floor(Math.random() * 3)}-${Math.floor(Math.random() * 2)}` : "vs"
              });
          }
      });
      // Thêm trận live đặc biệt cho các giải lớn
      matches.push({ id:"ucl_live_special", tournamentId:"ucl", tournamentName:"UEFA Champions League", leagueLogo: tournaments.find(t=>t.id==="ucl").logo, scheduleLink: tournaments.find(t=>t.id==="ucl").scheduleLink, homeTeam:{name:"Real Madrid", logo:"https://cdn-icons-png.flaticon.com/512/207/207011.png"}, awayTeam:{name:"Bayern Munich", logo:"https://cdn-icons-png.flaticon.com/512/207/207008.png"}, datetime:new Date(), live:true, half:"Hiệp 2", minute:"73'", score:"2-1"});
      matches.push({ id:"pl_live_special", tournamentId:"pl", tournamentName:"Premier League", leagueLogo: tournaments.find(t=>t.id==="pl").logo, scheduleLink: tournaments.find(t=>t.id==="pl").scheduleLink, homeTeam:{name:"Liverpool", logo:"https://cdn-icons-png.flaticon.com/512/207/207007.png"}, awayTeam:{name:"Man City", logo:"https://cdn-icons-png.flaticon.com/512/207/207017.png"}, datetime:new Date(), live:true, half:"Hiệp 1", minute:"28'", score:"0-0"});
      return matches;
  }

  // --- TẤT CẢ DỮ LIỆU (KẾT HỢP) ---
  let allMatches = [];

  async function loadAllData() {
      const wcMatches = await fetchWorldCupMatches();
      const mockMatches = generateMockMatches();
      // Thêm 1 trận mẫu cho AFC Cup 2027
      const afcMock = { id: "afc_mock", tournamentId: "afc2027", tournamentName: "AFC Asian Cup 2027", leagueLogo: tournaments.find(t=>t.id==="afc2027").logo, scheduleLink: tournaments.find(t=>t.id==="afc2027").scheduleLink, homeTeam: { name: "Việt Nam", logo: "https://cdn-icons-png.flaticon.com/512/207/207009.png" }, awayTeam: { name: "Hàn Quốc", logo: "https://cdn-icons-png.flaticon.com/512/207/207011.png" }, datetime: new Date(2027, 0, 15, 19, 30), live: false, half: null, minute: null, score: "vs" };
      allMatches = [...wcMatches, ...mockMatches, afcMock];
      renderTabs();
      renderMatches();
  }

  // --- TYPEWRITER CHẠY CHỮ "Tại đây có lịch ..." (ĐÚNG YÊU CẦU) ---
  const phrases = [
      "Tại đây có lịch World Cup 2026",
      "Tại đây có lịch Premier League",
      "Tại đây có lịch LaLiga",
      "Tại đây có lịch Bundesliga",
      "Tại đây có lịch Serie A",
      "Tại đây có lịch Ligue 1",
      "Tại đây có lịch MLS",
      "Tại đây có lịch ROSHN Saudi League",
      "Tại đây có lịch UEFA Champions League",
      "Tại đây có lịch UEFA Europa League",
      "Tại đây có lịch UEFA Conference League",
      "Tại đây có lịch AFC Asian Cup 2027"
  ];
  let phraseIndex = 0;
  let charIndex = 0;
  let isDeleting = false;
  const typewriterSpan = document.getElementById("typewriter-text");

  function typeWriterEffect() {
      const currentPhrase = phrases[phraseIndex];
      if (isDeleting) {
          typewriterSpan.innerText = currentPhrase.substring(0, charIndex - 1);
          charIndex--;
          if (charIndex === 0) {
              isDeleting = false;
              phraseIndex = (phraseIndex + 1) % phrases.length;
          }
      } else {
          typewriterSpan.innerText = currentPhrase.substring(0, charIndex + 1);
          charIndex++;
          if (charIndex === currentPhrase.length) {
              isDeleting = true;
              setTimeout(() => {}, 1500);
          }
      }
      setTimeout(typeWriterEffect, isDeleting ? 60 : 120);
  }
  typeWriterEffect();

  // --- UI RENDER (TABS + MATCH CARDS) ---
  const tabsContainer = document.getElementById("tabs-container");
  let activeTab = "all";
  function renderTabs() {
      let html = `<button class="tab-btn active" data-tab="all">🏆 Tất cả giải</button>`;
      tournaments.forEach(t => { html += `<button class="tab-btn" data-tab="${t.id}"><img src="${t.logo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/555/555600.png'"> ${t.name}</button>`; });
      tabsContainer.innerHTML = html;
      document.querySelectorAll(".tab-btn").forEach(btn => { btn.addEventListener("click", () => { document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); activeTab = btn.getAttribute("data-tab"); renderMatches(); }); });
  }

  function renderMatches() {
      const container = document.getElementById("matches-container");
      let filtered = activeTab === "all" ? allMatches : allMatches.filter(m => m.tournamentId === activeTab);
      if (filtered.length === 0) { container.innerHTML = `<div class="no-matches">⚽ Không có trận đấu nào cho giải này ⚽</div>`; return; }
      const html = filtered.map(match => {
          const isLive = match.live;
          const dateObj = match.datetime;
          const dateStr = dateObj.toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric'});
          const timeStr = dateObj.toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'});
          let bannerStatus = isLive && match.half && match.minute ? `${match.half} • ${match.minute}` : (isLive ? "Đang thi đấu" : `${dateStr} | ${timeStr}`);
          const liveHtml = isLive ? `<div class="live-badge">🔴 LIVE</div>` : `<div class="live-badge scheduled">📅 SẮP ĐÁ</div>`;
          const scoreHtml = isLive ? `<div class="score-area">${match.score}</div>` : `<div class="score-area" style="opacity:0.7;">⚽ vs ⚽</div>`;
          return `<div class="match-card"><div class="match-header"><div class="league-logo"><img src="${match.leagueLogo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/555/555600.png'"><span>${match.tournamentName}</span></div>${liveHtml}</div><div class="teams"><div class="team"><img src="${match.homeTeam.logo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/207/207011.png'"><span class="team-name">${match.homeTeam.name}</span></div><div class="vs">VS</div><div class="team"><img src="${match.awayTeam.logo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/207/207008.png'"><span class="team-name">${match.awayTeam.name}</span></div></div><div class="datetime-banner"><div class="date-time"><i class="far fa-calendar-alt"></i> ${dateStr} &nbsp; <i class="far fa-clock"></i> ${timeStr}</div><div class="match-status"><i class="fas fa-${isLive ? 'futbol' : 'hourglass-half'}"></i> ${bannerStatus}</div></div>${scoreHtml}<div class="match-link"><a href="${match.scheduleLink}" target="_blank">📅 Xem lịch chi tiết <i class="fas fa-external-link-alt"></i></a></div></div>`;
      }).join("");
      container.innerHTML = html;
  }
  
  function updateRealtimeSimulation() {
      allMatches = allMatches.map(m => { if(m.live && m.minute) { let currentMin = parseInt((m.minute || "0'").replace("'","")); if(!isNaN(currentMin) && currentMin < 89) { currentMin += 1; return { ...m, minute: `${currentMin}'`, half: currentMin < 45 ? "Hiệp 1" : "Hiệp 2" }; } } return m; });
      renderMatches();
  }
  setInterval(updateRealtimeSimulation, 38000);
  
  loadAllData();
</script>
</body>
