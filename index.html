<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExScore — Lịch Thi Đấu Bóng Đá 2026</title>
<meta name="description" content="ExScore — Lịch thi đấu World Cup 2026, Premier League, LaLiga, Bundesliga, Serie A, Ligue 1, MLS, ROSHN Saudi League, UEFA Champions League, Europa League, Conference League và AFC Asian Cup 2027.">

<link rel="icon" type="image/png" sizes="192x192" href="assets/logo-192.png">
<link rel="apple-touch-icon" href="assets/logo-192.png">

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --navy-950:#040A16; --navy-900:#08122A; --navy-850:#0B1A38; --navy-800:#102447;
  --navy-750:#142C57; --navy-700:#17336B; --navy-line:rgba(143,184,255,.14);
  --blue-700:#143CA8; --blue-600:#1E4FD6; --blue-500:#3D7CFF; --blue-400:#6398FF;
  --blue-300:#9BC0FF; --blue-100:#DCEBFF;
  --ice:#EAF2FF; --muted:#8AA3D1; --muted-2:#5C75A3;
  --live:#FF3344; --live-soft:#FF6B7A; --live-glow:rgba(255,51,68,.45);
  --gold:#FFC857; --green:#34D399;
  --r-lg:18px; --r-md:14px; --r-sm:8px;
  --shadow-card:0 10px 26px -14px rgba(2,8,23,.7);
  --ff-display:'Anton', sans-serif; --ff-body:'Inter', sans-serif; --ff-mono:'JetBrains Mono', monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--ff-body);
  background-color:var(--navy-950);
  background-image:
    radial-gradient(ellipse 900px 500px at 18% -8%, rgba(61,124,255,.20), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 6%, rgba(255,200,87,.06), transparent 55%),
    radial-gradient(ellipse 800px 600px at 50% 100%, rgba(30,79,214,.12), transparent 60%);
  color:var(--ice); -webkit-font-smoothing:antialiased; min-height:100vh;
}
img{max-width:100%; display:block;}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer; background:none; border:none; color:inherit;}
:focus-visible{outline:2px solid var(--blue-400); outline-offset:2px; border-radius:4px;}
.wrap{max-width:1180px; margin:0 auto; padding:0 16px;}

/* ===== HEADER ===== */
.site-header{
  position:sticky; top:0; z-index:60;
  background:rgba(8,18,42,.85); backdrop-filter:blur(14px) saturate(140%);
  border-bottom:1px solid var(--navy-line);
}
.header-inner{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0;}
.brand{display:flex; align-items:center; gap:10px; min-width:0;}
.brand-logo{width:38px; height:38px; border-radius:50%; flex-shrink:0;
  box-shadow:0 0 0 1px rgba(143,184,255,.25), 0 6px 14px -6px rgba(61,124,255,.65);}
.brand-text{display:flex; flex-direction:column; line-height:1.1; min-width:0;}
.brand-name{font-family:var(--ff-display); font-weight:400; letter-spacing:.03em; font-size:19px; color:var(--ice); white-space:nowrap;}
.brand-name span{color:var(--blue-400);}
.brand-tag{font-size:9.5px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; white-space:nowrap;}
.header-right{display:flex; align-items:center; gap:6px; flex-shrink:0;}
.clock-chip{
  display:flex; flex-direction:column; align-items:center; gap:1px;
  background:linear-gradient(180deg, var(--navy-800), var(--navy-850));
  border:1px solid var(--navy-line); border-radius:999px;
  padding:6px 14px; font-family:var(--ff-mono);
}
.clock-chip .row1{display:flex; align-items:center; gap:6px;}
.clock-chip .dot{width:6px; height:6px; border-radius:50%; background:var(--green); flex-shrink:0;
  animation:dotpulse 2.4s ease-out infinite;}
.clock-chip #clockTime{font-size:13px; font-weight:700; color:var(--ice); letter-spacing:.03em;}
.clock-chip #clockDate{font-size:9px; color:var(--muted); letter-spacing:.04em;}
@keyframes dotpulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,.55);}70%{box-shadow:0 0 0 6px rgba(52,211,153,0);}100%{box-shadow:0 0 0 0 rgba(52,211,153,0);}}
.icon-btn{
  width:34px; height:34px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:15px;
  background:var(--navy-800); border:1px solid var(--navy-line); color:var(--blue-300);
  transition:.15s ease;
}
.icon-btn:hover{background:var(--blue-600); color:#fff; border-color:var(--blue-500); transform:translateY(-1px);}
.icon-btn.spinning{animation:spin .6s linear;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== TICKER ===== */
.ticker{position:relative; background:var(--navy-900); border-bottom:1px solid var(--navy-line); overflow:hidden; padding:7px 0;}
.ticker::before,.ticker::after{content:""; position:absolute; top:0; bottom:0; width:48px; z-index:2; pointer-events:none;}
.ticker::before{left:0; background:linear-gradient(90deg, var(--navy-900), transparent);}
.ticker::after{right:0; background:linear-gradient(270deg, var(--navy-900), transparent);}
.ticker-track{display:flex; align-items:center; gap:26px; width:max-content; animation:ticker-scroll 42s linear infinite;}
.ticker:hover .ticker-track{animation-play-state:paused;}
.ticker-item{display:flex; align-items:center; gap:8px; font-family:var(--ff-mono); font-size:11.5px; letter-spacing:.04em; color:var(--blue-300); white-space:nowrap;}
.ticker-item img{width:18px; height:18px; border-radius:50%; flex-shrink:0;}
.ticker-item b{color:var(--ice); font-weight:600; font-family:var(--ff-body);}
.ticker-sep{color:var(--muted-2); font-size:10px;}
@keyframes ticker-scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ===== TYPEWRITER STRIP ===== */
.type-strip{background:var(--navy-850); border-bottom:1px solid var(--navy-line); padding:8px 0;}
.type-strip .wrap{display:flex; align-items:center; justify-content:center; gap:8px; font-size:12px; color:var(--blue-300); min-height:16px;}
.type-strip .pin{flex-shrink:0;}
.caret{display:inline-block; width:7px; height:1em; background:var(--blue-400); margin-left:1px; vertical-align:-2px; animation:caret-blink 1s step-end infinite;}
@keyframes caret-blink{50%{opacity:0;}}

/* ===== FILTERS ===== */
.filters{position:sticky; top:59px; z-index:50; background:rgba(4,10,22,.94); backdrop-filter:blur(10px); border-bottom:1px solid var(--navy-line); padding:10px 0;}
.filters-track{display:flex; flex-wrap:wrap; gap:7px; justify-content:center;}
.filter-pill{
  display:flex; align-items:center; gap:6px; background:var(--navy-800); border:1px solid var(--navy-line);
  color:var(--muted); font-size:11.5px; font-weight:600; padding:7px 12px; border-radius:999px;
  transition:.15s ease; white-space:nowrap;
}
.filter-pill img{width:16px; height:16px; border-radius:50%;}
.filter-pill:hover{color:var(--ice); border-color:var(--blue-500);}
.filter-pill.active{background:linear-gradient(135deg, var(--blue-600), var(--blue-700)); border-color:var(--blue-500); color:#fff;
  box-shadow:0 6px 16px -8px rgba(30,79,214,.8);}

/* ===== MAIN GRID ===== */
main{padding:22px 0 30px;}
.match-grid{display:grid; grid-template-columns:repeat(2, 1fr); gap:12px;}
@media (max-width:300px){.match-grid{grid-template-columns:1fr;}}

.match-card{
  display:flex; flex-direction:column; gap:9px;
  background:linear-gradient(165deg, var(--navy-800), var(--navy-850));
  border:1px solid var(--navy-line); border-radius:var(--r-md);
  padding:12px; box-shadow:var(--shadow-card);
  transition:transform .15s ease, border-color .15s ease;
}
.match-card:hover{transform:translateY(-2px); border-color:var(--blue-500);}
.match-card.status-live{border-color:rgba(255,51,68,.42); border-left:3px solid var(--live);
  box-shadow:var(--shadow-card), 0 0 22px -12px var(--live-glow); animation:live-card-pulse 2.6s ease-in-out infinite;}
@keyframes live-card-pulse{0%,100%{box-shadow:var(--shadow-card), 0 0 16px -12px var(--live-glow);}50%{box-shadow:var(--shadow-card), 0 0 28px -8px var(--live-glow);}}
.match-card.status-ft{opacity:.8;}

.card-top{display:flex; align-items:center; justify-content:space-between; gap:6px;}
.card-comp{display:flex; align-items:center; gap:6px; min-width:0; font-size:10.5px; color:var(--muted); font-weight:600; letter-spacing:.02em; overflow:hidden;}
.card-comp img{width:18px; height:18px; border-radius:50%; flex-shrink:0;}
.card-comp span{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

.status-tag{display:inline-flex; align-items:center; gap:4px; font-family:var(--ff-mono); font-weight:700; font-size:9.5px; letter-spacing:.06em; padding:3px 8px; border-radius:999px; flex-shrink:0; white-space:nowrap;}
.status-tag.live{background:var(--live); color:#fff; box-shadow:0 4px 12px -4px var(--live-glow);}
.status-tag.live .live-blip{width:5px; height:5px; border-radius:50%; background:#fff; animation:live-blink 1.1s ease-in-out infinite;}
@keyframes live-blink{0%,100%{opacity:1; transform:scale(1);}50%{opacity:.3; transform:scale(.7);}}
.status-tag.upcoming{background:rgba(61,124,255,.16); color:var(--blue-300); border:1px solid rgba(61,124,255,.35);}
.status-tag.ft{background:rgba(143,163,209,.12); color:var(--muted); border:1px solid var(--navy-line);}

.card-teams{display:flex; align-items:center; justify-content:space-between; gap:6px;}
.team-block{display:flex; align-items:center; gap:7px; min-width:0; flex:1;}
.team-badge{flex-shrink:0; width:26px; height:26px; border-radius:50%; object-fit:cover; background:var(--navy-700); box-shadow:0 0 0 1px rgba(143,184,255,.18);}
.team-badge.club{display:flex; align-items:center; justify-content:center; font-family:var(--ff-mono); font-weight:700; font-size:8.5px; letter-spacing:.01em; text-shadow:0 1px 2px rgba(0,0,0,.45);}
.team-name{min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:clamp(11px,2.4vw,13.5px); font-weight:600; color:var(--ice);}
.vs-label{flex-shrink:0; font-size:9.5px; color:var(--muted-2); letter-spacing:.08em; padding:0 2px;}

.card-date{display:flex; align-items:center; justify-content:space-between; font-family:var(--ff-mono); font-size:10.5px; color:var(--muted);}
.card-date .ico{margin-right:4px;}

.highlight-pill{display:flex; align-items:center; justify-content:center; gap:5px; font-family:var(--ff-mono); font-size:11px; font-weight:700; letter-spacing:.04em; padding:5px 8px; border-radius:999px; text-align:center;}
.highlight-pill.live{background:rgba(255,51,68,.14); border:1px solid rgba(255,51,68,.35); color:#fff;}
.highlight-pill.upcoming{background:rgba(61,124,255,.10); border:1px solid rgba(61,124,255,.28); color:var(--blue-300);}
.highlight-pill.ft{background:rgba(143,163,209,.08); border:1px solid var(--navy-line); color:var(--muted);}

.score-pill{display:flex; align-items:center; justify-content:center; gap:10px; background:var(--navy-950); border:1px solid var(--navy-line); border-radius:var(--r-sm); padding:8px 10px;}
.score-num{font-family:var(--ff-mono); font-weight:700; font-size:19px; color:var(--ice);}
.score-dash{font-family:var(--ff-mono); color:var(--muted-2); font-size:15px;}
.score-pill.placeholder{gap:8px;}
.score-pill.placeholder .ball{font-size:15px; opacity:.55; filter:grayscale(1);}
.score-pill.placeholder .vs-text{font-family:var(--ff-mono); font-size:11px; letter-spacing:.1em; color:var(--muted); text-transform:uppercase;}

.detail-link{display:flex; align-items:center; justify-content:flex-end; gap:4px; font-size:10.5px; color:var(--muted-2); align-self:flex-end; padding:2px 0; transition:.15s ease;}
.detail-link:hover{color:var(--blue-300);}
.detail-link .arrow{font-size:10px;}

/* ===== FOOTER ===== */
.site-footer{border-top:1px solid var(--navy-line); background:var(--navy-900); padding:30px 0; margin-top:10px;}
.footer-inner{display:flex; flex-direction:column; align-items:center; gap:12px; text-align:center;}
.footer-brand{display:flex; align-items:center; gap:9px;}
.footer-brand img{width:30px; height:30px; border-radius:50%;}
.footer-brand span{font-family:var(--ff-display); font-size:16px; letter-spacing:.03em;}
.footer-links{display:flex; gap:16px; flex-wrap:wrap; justify-content:center; font-size:12px; color:var(--muted);}
.footer-links a:hover{color:var(--blue-300);}
.footer-copy{font-size:11.5px; color:var(--muted-2); letter-spacing:.02em;}
.footer-note{font-size:10.5px; color:var(--muted-2); max-width:480px; line-height:1.6;}

/* ===== TOAST ===== */
.toast{position:fixed; left:50%; bottom:22px; transform:translateX(-50%) translateY(10px); background:var(--navy-800); border:1px solid var(--blue-500); color:var(--ice); font-size:12.5px; padding:10px 18px; border-radius:999px; box-shadow:0 12px 30px -10px rgba(2,8,23,.8); z-index:200; opacity:0; transition:opacity .25s ease, transform .25s ease; pointer-events:none; white-space:nowrap;}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

@media (max-width:480px){
  .brand-tag{display:none;}
  .clock-chip #clockDate{display:none;}
  .clock-chip{padding:6px 10px;}
}
@media (prefers-reduced-motion: reduce){
  .ticker-track,.caret,.status-tag.live .live-blip,.match-card.status-live,.clock-chip .dot{animation:none !important;}
}
</style>
</head>

function fmtDate(dStr){
  const [y,m,d] = dStr.split('-').map(Number);
  return `${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}`;
}

function teamBadgeHtml(team){
  if(team.type === 'flag'){
    const fallback = team.name.slice(0,3).toUpperCase();
    return `<img class="team-badge" loading="lazy"
      src="https://flagcdn.com/h80/${team.iso}.png"
      srcset="https://flagcdn.com/h160/${team.iso}.png 2x"
      alt="Cờ ${team.name}"
      onerror="this.outerHTML='<div class=&quot;team-badge club&quot; style=&quot;background:linear-gradient(135deg,#1E4FD6,#102447)&quot;>${fallback}</div>'">`;
  }
  const grad = `linear-gradient(135deg, ${team.c1}, ${team.c2})`;
  return `<div class="team-badge club" style="background:${grad}; color:${team.fg}">${team.abbr}</div>`;
}

function matchCardHtml(m){
  const comp = COMPETITIONS.find(c => c.id === m.comp);

  const statusTag = m.status === 'live'
    ? `<span class="status-tag live"><span class="live-blip" aria-hidden="true"></span>LIVE</span>`
    : m.status === 'ft'
      ? `<span class="status-tag ft">🏁 KT</span>`
      : `<span class="status-tag upcoming">📅 SẮP ĐÁ</span>`;

  const highlightRow = m.status === 'live'
    ? `<div class="highlight-pill live"><span class="ico">🕐</span>Hiệp ${m.live ? m.live.half : '-'} • ${m.live ? m.live.minute : '-'}'</div>`
    : m.status === 'ft'
      ? `<div class="highlight-pill ft"><span class="ico">🏁</span>Trận đấu đã kết thúc</div>`
      : `<div class="highlight-pill upcoming"><span class="ico">⏳</span>${fmtDate(m.date)} | ${m.time}</div>`;

  const scoreRow = (m.status === 'live' || m.status === 'ft') && m.score
    ? `<div class="score-pill"><span class="score-num">${m.score.h}</span><span class="score-dash">-</span><span class="score-num">${m.score.a}</span></div>`
    : `<div class="score-pill placeholder"><span class="ball">⚽</span><span class="vs-text">vs</span><span class="ball">⚽</span></div>`;

  return `
  <article class="match-card status-${m.status}" data-comp="${m.comp}">
    <div class="card-top">
      <div class="card-comp"><img src="${comp.badge}" alt=""><span>${comp.short}</span></div>
      ${statusTag}
    </div>
    <div class="card-teams">
      <div class="team-block">${teamBadgeHtml(m.home)}<span class="team-name">${m.home.name}</span></div>
      <span class="vs-label">vs</span>
      <div class="team-block">${teamBadgeHtml(m.away)}<span class="team-name">${m.away.name}</span></div>
    </div>
    <div class="card-date">
      <span><span class="ico">📅</span>${fmtDate(m.date)}</span>
      <span><span class="ico">🕐</span>${m.time}</span>
    </div>
    ${highlightRow}
    ${scoreRow}
    <button class="detail-link" type="button" onclick="showToast('Chi tiết trận đấu đang được cập nhật...')">
      <span class="ico">📋</span>Xem lịch chi tiết<span class="arrow">↗</span>
    </button>
  </article>`;
}

const STATUS_ORDER = { live:0, ns:1, ft:2 };

function renderSchedule(){
  const sorted = [];
  COMPETITIONS.forEach(comp => {
    const ms = MATCHES.filter(m => m.comp === comp.id).slice().sort((a,b) => {
      const so = STATUS_ORDER[a.status] - STATUS_ORDER[b.status];
      if(so !== 0) return so;
      return (a.date+a.time).localeCompare(b.date+b.time);
    });
    sorted.push(...ms);
  });
  document.getElementById('matchGrid').innerHTML = sorted.map(m => {
    try { return matchCardHtml(m); }
    catch(err){ console.error('Lỗi render trận đấu, đã bỏ qua:', m, err); return ''; }
  }).join('');
}

function renderTicker(){
  const items = COMPETITIONS.map(c =>
    `<div class="ticker-item"><img src="${c.badge}" alt=""><b>${c.short}</b></div><span class="ticker-sep">●</span>`
  ).join('');
  document.getElementById('tickerTrack').innerHTML = items + items;
}

function renderFilters(){
  const track = document.getElementById('filtersTrack');
  const all = `<button class="filter-pill active" data-filter="all">🏆 Tất cả giải</button>`;
  const pills = COMPETITIONS.map(c =>
    `<button class="filter-pill" data-filter="${c.id}"><img src="${c.badge}" alt="">${c.short}</button>`
  ).join('');
  track.innerHTML = all + pills;

  track.addEventListener('click', e => {
    const btn = e.target.closest('.filter-pill');
    if(!btn) return;
    track.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.dataset.filter;
    document.querySelectorAll('#matchGrid .match-card').forEach(card => {
      card.style.display = (filter === 'all' || card.dataset.comp === filter) ? '' : 'none';
    });
  });
}

function tickClock(){
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockTime').textContent = `${hh}:${mm}:${ss}`;
  const dd = String(now.getDate()).padStart(2,'0');
  const mo = String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('clockDate').textContent = `${WEEKDAYS_SHORT[now.getDay()]}, ${dd}/${mo}/${now.getFullYear()}`;
}

function startTypewriter(el, phrases){
  let pi = 0, ci = 0, deleting = false;
  function step(){
    const phrase = phrases[pi];
    if(!deleting){
      ci++; el.textContent = phrase.slice(0, ci);
      if(ci === phrase.length){ deleting = true; return setTimeout(step, 1900); }
      return setTimeout(step, 45);
    } else {
      ci--; el.textContent = phrase.slice(0, ci);
      if(ci === 0){ deleting = false; pi = (pi+1) % phrases.length; return setTimeout(step, 400); }
      return setTimeout(step, 22);
    }
  }
  step();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function startLiveTicker(){
  setInterval(() => {
    let changed = false;
    MATCHES.forEach(m => {
      if(m.status !== 'live') return;
      if(m.live.minute < 45){ m.live.minute++; changed = true; }
      else if(m.live.minute === 45 && m.live.half === 1){ m.live.half = 2; m.live.minute = 46; changed = true; }
      else if(m.live.minute < 90){ m.live.minute++; changed = true; }
    });
    if(changed) renderSchedule();
  }, 60000);
}

function init(){
  renderTicker();
  renderFilters();
  renderSchedule();
  tickClock();
  setInterval(tickClock, 1000);
  startTypewriter(document.getElementById('typewriter'), TYPE_PHRASES);
  startLiveTicker();

  document.getElementById('btnCalendar').addEventListener('click', () => {
    document.getElementById('schedule').scrollIntoView({behavior:'smooth', block:'start'});
  });
  document.getElementById('btnRefresh').addEventListener('click', (e) => {
    e.currentTarget.classList.add('spinning');
    setTimeout(() => e.currentTarget.classList.remove('spinning'), 600);
    renderSchedule();
    showToast('Đã làm mới lịch thi đấu');
  });
}
document.addEventListener('DOMContentLoaded', init);
</script>
